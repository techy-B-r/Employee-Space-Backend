spring.application.name=employee-space-backend
server.port=8080

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/employee_space_db
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=your_secret_key_here_min_32_characters_for_hs512
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.employeespace=DEBUG